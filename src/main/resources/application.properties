spring.application.name=sumo_analyzer

# ===============================
# データベース接続設定 (クラウド対応版)
# ===============================
# クラウド上の環境変数があればそれを使い、なければローカルの設定を使う
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sumo_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# MyBatis の便利設定
# ===============================
# DBの「スネークケース(例: created_at)」をJavaの「キャメルケース(例: createdAt)」に自動変換する
mybatis.configuration.map-underscore-to-camel-case=true

# MyBatisのXMLマッパーファイルの場所を指定
mybatis.mapper-locations=classpath:mapper/**/*.xml